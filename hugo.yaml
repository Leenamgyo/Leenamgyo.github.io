baseURL: "https://leenamgyo.github.io/"
languageCode: "ko-kr"
title: "Namgyo Lee"
theme: "PaperMod"

enableRobotsTXT: true

params:
  homeInfoParams:
    Title: "Wiki"
    Content: >
      이 위키는 개발 과정에서의 고민과 설계 의도, 기술적인 정리를 기록하기 위한 공간입니다.
      
      
      코드보다 맥락을, 결과보다 과정을 남기는 것을 목표로 합니다.

  env: "production"
  defaultTheme: "auto"
  ShowReadingTime: true
  ShowBreadCrumbs: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  ShowSummary: true
  mainSections:
    - posts

  socialIcons:
    - name: github
      url: "https://github.com/Leenamgyo"
    - name: linkedin
      url: "https://www.linkedin.com/in/your-linkedin-id/"

menu:
  main:
    - name: "Archive"
      url: "/archives/"
      weight: 1
    - name: "Search"
      url: "/search/"
      weight: 2
    - name: "Tags"
      url: "/tags/"
      weight: 3

outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search