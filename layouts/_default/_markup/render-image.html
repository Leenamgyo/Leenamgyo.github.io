{{- $dest := .Destination -}}

{{/* 1. 경로가 ../static 으로 시작하는지 확인 */}}
{{- if strings.HasPrefix $dest "../static" -}}
  {{/* 2. ../static을 제거하고 루트(/) 경로로 변경 */}}
  {{- $dest = strings.TrimPrefix "../static" $dest -}}
{{- end -}}

<img src="{{ $dest | safeURL }}" alt="{{ .Text }}" {{ with .Title }} title="{{ . }}" {{ end }} />
