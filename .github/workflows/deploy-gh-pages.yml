name: Build and Publish to gh-pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "gh-pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Step 0) 소스 체크아웃
      - name: Checkout source (main)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # Step 1) Hugo 빌드
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.125.7"
          extended: true

      - name: Build site (public/)
        run: hugo --minify

      # Step 2) gh-pages에 올릴 결과물 준비 (Jekyll 비활성)
      - name: Disable Jekyll
        run: touch public/.nojekyll

      # Step 3) public/ 내용을 gh-pages 브랜치 루트로 배포
      - name: Deploy public/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
