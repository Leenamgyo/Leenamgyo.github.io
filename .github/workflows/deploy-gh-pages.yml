name: Build -> Commit to gh-pages -> Publish

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "gh-pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build (generate public/)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.125.7"
          extended: true

      - name: Build site to public/
        run: hugo --minify

      - name: Disable Jekyll
        run: touch public/.nojekyll

      - name: Upload build artifact (public)
        uses: actions/upload-artifact@v4
        with:
          name: public
          path: public
          if-no-files-found: error

  deploy:
    name: Deploy (commit public/ into gh-pages)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: public
          path: public

      # gh-pages 브랜치에 public/ "내용"을 루트로 올림
      - name: Commit & Push to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
